name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Avoid double-publish if the same tag is force-pushed during a run
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # GitHub Releases are created by hand with curated notes.
      # The workflow's only job is npm publish, so contents stays read.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
