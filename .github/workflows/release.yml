name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Avoid double-publish if the same tag is force-pushed during a run
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # GitHub Releases are created by hand with curated notes.
      # The workflow's only job is npm publish, so contents stays read.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm CLI >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      # Authenticates via npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN needed.
      # Configure once at https://www.npmjs.com/package/brandmd/access (Trusted Publishers section).
      - run: npm publish --provenance --access public
